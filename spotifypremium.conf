[Rule]
DOMAIN-SUFFIX,ads-fa.spotify.com,REJECT
DOMAIN-SUFFIX,audio-ak-spotify-com.akamaized.net,REJECT
DOMAIN-SUFFIX,audio-ak.spotify.com.edgesuite.net,REJECT
DOMAIN-KEYWORD,ad-delivery,REJECT

[Header Rewrite]
^https?:\/\/spclient\.wg\.spotify\.com\/user-customization-service\/v1\/customize$ header-del if-none-match

[Script]
spotify-request = type=http-request,pattern=^https:\/\/(spclient\.wg\.spotify\.com|.*-spclient\.spotify\.com(:443)?)\/(artistview\/v1\/artist|album-entity-view\/v2\/album|bootstrap\/v1\/bootstrap|user-customization-service\/v1\/customize)$,script-path=https://raw.githubusercontent.com/Cthinhdzs1tg/Spotify-Premium/refs/heads/main/spotify-request.js

spotify-response = type=http-response,pattern=^https:\/\/(spclient\.wg\.spotify\.com|.*-spclient\.spotify\.com(:443)?)\/(bootstrap\/v1\/bootstrap|user-customization-service\/v1\/customize)$,requires-body=1,binary-body-mode=1,max-size=0,script-path=https://raw.githubusercontent.com/Cthinhdzs1tg/Spotify-Premium/refs/heads/main/spotify-response.js

[MITM]
hostname = %APPEND%, spclient.wg.spotify.com, *spclient.spotify.com, api.spotify.com, auth.spotify.com
